<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Khảo sát chế độ ăn</title>

<link rel="stylesheet" href="style.css">

<script>

function tinhDiem(){

let diem=0;

for(let i=1;i<=16;i++){

let cau=document.querySelector('input[name="q'+i+'"]:checked');

if(cau && cau.value=="1"){

diem++;

}

}

document.getElementById("ketqua").innerHTML=

"Điểm MEPA của bạn: "+diem+" / 16";

}

</script>

</head>

<body>

<div class="container">

<h2>Khảo sát chế độ ăn</h2>

<form>

<p>1. Bạn có sử dụng trên 2 khẩu phần dầu ô liu mỗi ngày không?</p>

<input type="radio" name="q1" value="1"> Có

<input type="radio" name="q1" value="0"> Không


<p>2. Bạn có ăn trên 7 khẩu phần rau lá xanh mỗi tuần không?</p>

<input type="radio" name="q2" value="1"> Có

<input type="radio" name="q2" value="0"> Không


<p>3. Bạn có ăn trên 2 khẩu phần các loại rau khác mỗi ngày không?</p>

<input type="radio" name="q3" value="1"> Có

<input type="radio" name="q3" value="0"> Không


<!-- tiếp tục câu 4 đến câu 16 -->

<br><br>

<button type="button" onclick="tinhDiem()">

XEM KẾT QUẢ

</button>

</form>

<h3 id="ketqua"></h3>

</div>

</body>

</html>
