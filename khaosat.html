<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Khảo sát</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<h2>Khảo sát chế độ ăn</h2>

<form id="form"></form>

<button onclick="submitForm()">Xem kết quả</button>

</div>

<script>
const questions = [
"Dầu ô liu >2 khẩu phần/ngày?",
"Rau lá xanh >7 khẩu phần/tuần?",
"Rau khác >2 khẩu phần/ngày?",
"Quả mọng >2 khẩu phần/tuần?",
"Trái cây >1 khẩu phần/ngày?",
"Thịt đỏ <3 khẩu phần/tuần?",
"Cá >1 khẩu phần/tuần?",
"Gà <5 khẩu phần/tuần?",
"Phô mai béo <4 khẩu phần/tuần?",
"Bơ/kem <5 khẩu phần/tuần?",
"Đậu >3 khẩu phần/tuần?",
"Ngũ cốc nguyên hạt >3 khẩu phần/ngày?",
"Đồ ngọt <4 khẩu phần/tuần?",
"Hạt >4 khẩu phần/tuần?",
"Fast food <1 lần/tuần?",
"Rượu ở mức phù hợp?"
];

let form = document.getElementById("form");

questions.forEach((q,i)=>{
form.innerHTML += `
<div class="question">
<p>${i+1}. ${q}</p>
<label><input type="radio" name="q${i}" value="1"> Có</label>
<label><input type="radio" name="q${i}" value="0"> Không</label>
</div>
`;
});

function submitForm(){
let score=0;

for(let i=0;i<16;i++){
let q=document.querySelector(`input[name="q${i}"]:checked`);
if(!q){
alert("Vui lòng trả lời đầy đủ 16 câu");
return;
}
score+=parseInt(q.value);
}

localStorage.setItem("score",score);

document.body.innerHTML=`<div class="loading">Đang phân tích dữ liệu...</div>`;

setTimeout(()=>{
window.location.href="ketqua.html";
},1000);
}
</script>

</body>
</html>
