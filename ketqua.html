<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết quả MEPA - ĂN5+</title>

<style>
body {
    font-family: Arial;
    background: #f4f8fb;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

/* ===== GAUGE ===== */
.gauge {
    position: relative;
    width: 260px;
    height: 130px;
    margin: 30px auto;
}

/* nền trắng */
.gauge-base {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 260px 260px 0 0;
    background: #ecf0f1;
}

/* 3 lớp màu CHẮC CHẮN HIỂN THỊ */
.gauge-red,
.gauge-yellow,
.gauge-green {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 260px 260px 0 0;
    clip-path: inset(0 0 50% 0);
}

/* đỏ: 0–5 */
.gauge-red {
    background: conic-gradient(from 180deg, #e74c3c 0deg 56deg, transparent 56deg);
}

/* vàng: 6–10 */
.gauge-yellow {
    background: conic-gradient(from 180deg, transparent 0deg 56deg, #f1c40f 56deg 112deg, transparent 112deg);
}

/* xanh: 11–16 */
.gauge-green {
    background: conic-gradient(from 180deg, transparent 0deg 112deg, #2ecc71 112deg 180deg);
}

/* inner */
.gauge::after {
    content: "";
    position: absolute;
    width: 200px;
    height: 100px;
    background: white;
    border-radius: 200px 200px 0 0;
    top: 30px;
    left: 30px;
}

/* ===== NEEDLE ===== */
.needle {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 4px;
    height: 110px;
    background: black;
    transform-origin: bottom;
    transition: 0.8s;
}

/* ===== TICK ===== */
.ticks {
    position: absolute;
    width: 100%;
    height: 100%;
}

.tick {
    position: absolute;
    width: 2px;
    height: 8px;
    background: #333;
    bottom: 0;
    left: 50%;
    transform-origin: bottom;
}

.tick.big {
    height: 14px;
    background: #000;
}

/* ===== LABEL ===== */
.score {
    font-size: 28px;
    font-weight: bold;
}

.level {
    margin-top: 10px;
    padding: 10px;
    color: white;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Kết quả MEPA</h2>

<div class="gauge">

<div class="gauge-base"></div>
<div class="gauge-red"></div>
<div class="gauge-yellow"></div>
<div class="gauge-green"></div>

<div class="ticks" id="ticks"></div>

<div id="needle" class="needle"></div>

</div>

<div id="score" class="score"></div>
<div id="level" class="level"></div>

</div>

<script>
// ===== TẠO VẠCH 0–16 =====
let tickContainer = document.getElementById("ticks");

for(let i = 0; i <= 16; i++){
    let tick = document.createElement("div");
    tick.className = "tick";

    if(i % 5 === 0){
        tick.classList.add("big");
    }

    let angle = (i / 16) * 180;

    tick.style.transform = `rotate(${angle}deg) translateY(-130px)`;

    tickContainer.appendChild(tick);
}

// ===== LẤY ĐIỂM =====
let urlParams = new URLSearchParams(window.location.search);
let diem = parseInt(urlParams.get("score"));

if(isNaN(diem)){
    diem = parseInt(localStorage.getItem("diemMEPA"));
}

if(isNaN(diem)){
    diem = 8;
}

// ===== HIỂN THỊ =====
document.getElementById("score").innerText = diem + "/16";

// ===== XOAY KIM =====
let angle = (diem / 16) * 180;
document.getElementById("needle").style.transform = `rotate(${angle}deg)`;

// ===== PHÂN LOẠI =====
let levelBox = document.getElementById("level");

if(diem <= 5){
    levelBox.innerText = "Tuân thủ thấp";
    levelBox.style.background = "#e74c3c";
}
else if(diem <= 10){
    levelBox.innerText = "Tuân thủ trung bình";
    levelBox.style.background = "#f1c40f";
}
else{
    levelBox.innerText = "Tuân thủ cao";
    levelBox.style.background = "#2ecc71";
}
</script>

</body>
</html>
