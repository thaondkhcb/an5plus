<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết quả MEPA - ĂN5+</title>

<style>
body {
    font-family: Arial;
    background: #f4f8fb;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 18px;
    text-align: center;
}

/* ===== GAUGE ===== */
.gauge {
    position: relative;
    width: 260px;
    height: 130px;
    margin: 30px auto;
    border-radius: 260px 260px 0 0;
    overflow: hidden;

    /* 🎯 CHUẨN MEPA */
    background: conic-gradient(
        from -90deg,
        #e74c3c 0deg 56.25deg,     /* 0–5 */
        #f1c40f 56.25deg 112.5deg,/* 6–10 */
        #2ecc71 112.5deg 180deg   /* 11–16 */
    );
}

/* inner */
.gauge::after {
    content: "";
    position: absolute;
    width: 200px;
    height: 100px;
    background: white;
    border-radius: 200px 200px 0 0;
    top: 30px;
    left: 30px;
}

/* ===== NEEDLE ===== */
.needle {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 4px;
    height: 110px;
    background: black;
    transform-origin: bottom;
    transition: 0.8s;
}

/* ===== TICKS ===== */
.ticks {
    position: absolute;
    width: 100%;
    height: 100%;
}

.tick {
    position: absolute;
    width: 2px;
    height: 8px;
    background: #333;
    bottom: 0;
    left: 50%;
    transform-origin: bottom;
}

.tick.big {
    height: 16px;
    background: #000;
}

/* ===== TEXT ===== */
.score {
    font-size: 28px;
    font-weight: bold;
}

.level {
    margin-top: 10px;
    padding: 10px;
    color: white;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Kết quả MEPA</h2>

<div class="gauge">
    <div id="ticks" class="ticks"></div>
    <div id="needle" class="needle"></div>
</div>

<div id="score" class="score"></div>
<div id="level" class="level"></div>

</div>

<script>

// ===== TICK CHUẨN (TRÙNG NGƯỠNG) =====
const tickContainer = document.getElementById("ticks");
const radius = 115;

for(let i = 0; i <= 16; i++){
    let tick = document.createElement("div");

    // chỉ highlight 0-5-10-16
    if(i === 0 || i === 5 || i === 10 || i === 16){
        tick.className = "tick big";
    } else {
        tick.className = "tick";
    }

    let angle = -90 + (i / 16) * 180;

    tick.style.transform =
        `rotate(${angle}deg) translateY(-${radius}px)`;

    tickContainer.appendChild(tick);
}

// ===== LẤY ĐIỂM =====
let params = new URLSearchParams(window.location.search);
let diem = parseInt(params.get("score"));

if(isNaN(diem)){
    diem = parseInt(localStorage.getItem("diemMEPA"));
}

if(isNaN(diem)){
    diem = 8;
}

// ===== HIỂN THỊ =====
document.getElementById("score").innerText = diem + "/16";

// ===== XOAY KIM =====
let angle = -90 + (diem / 16) * 180;
document.getElementById("needle").style.transform =
    `rotate(${angle}deg)`;

// ===== PHÂN LOẠI =====
let levelBox = document.getElementById("level");

if(diem <= 5){
    levelBox.innerText = "Tuân thủ thấp";
    levelBox.style.background = "#e74c3c";
}
else if(diem <= 10){
    levelBox.innerText = "Tuân thủ trung bình";
    levelBox.style.background = "#f1c40f";
}
else{
    levelBox.innerText = "Tuân thủ cao";
    levelBox.style.background = "#2ecc71";
}

</script>

</body>
</html>
