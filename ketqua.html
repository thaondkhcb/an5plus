<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết quả MEPA - ĂN5+</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f8fb;
}

.container {
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    color: #2c3e50;
}

.score {
    font-size: 28px;
    font-weight: bold;
    margin-top: 10px;
}

.gauge {
    width: 260px;
    height: 130px;
    margin: 30px auto;
    position: relative;
    background: conic-gradient(
        #e74c3c 0deg 60deg,
        #f1c40f 60deg 120deg,
        #2ecc71 120deg 180deg
    );
    border-radius: 260px 260px 0 0;
}

.gauge::after {
    content: "";
    position: absolute;
    width: 200px;
    height: 100px;
    background: white;
    border-radius: 200px 200px 0 0;
    top: 30px;
    left: 30px;
}

.needle {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 4px;
    height: 110px;
    background: #2c3e50;
    transform-origin: bottom;
}

.level {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
}

.advice {
    text-align: left;
    margin-top: 20px;
    font-size: 14px;
    line-height: 1.5;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">

<h2>Kết quả đánh giá MEPA</h2>

<div class="gauge">
    <div id="needle" class="needle"></div>
</div>

<div id="score" class="score"></div>
<div id="level" class="level"></div>

<div class="advice" id="advice"></div>

<div class="footer">
Kết quả phản ánh mức độ tuân thủ chế độ ăn kiểu Địa Trung Hải (MEPA).  
Không thay thế chẩn đoán hoặc tư vấn y khoa.
</div>

</div>

<script>
let diem = parseInt(localStorage.getItem("diemMEPA") || 0);

// Hiển thị điểm
document.getElementById("score").innerText = diem + " / 16 điểm";

// Xoay kim
let goc = (diem / 16) * 180;
document.getElementById("needle").style.transform = "rotate(" + goc + "deg)";

// Phân loại
let level = "";
let color = "";
let advice = "";

if(diem <= 5){
    level = "Tuân thủ thấp";
    color = "#e74c3c";
    advice = `
    Bạn chưa đạt mức tuân thủ chế độ ăn lành mạnh. 
    Nên tăng cường:
    • Rau xanh và trái cây mỗi ngày  
    • Cá, đậu và các loại hạt  
    • Ngũ cốc nguyên hạt  
    Đồng thời giảm tiêu thụ thịt đỏ và thực phẩm chế biến.
    `;
}
else if(diem <= 10){
    level = "Tuân thủ trung bình";
    color = "#f1c40f";
    advice = `
    Bạn đã có một số thói quen ăn uống tốt. 
    Để cải thiện hơn:
    • Tăng tần suất ăn cá và rau  
    • Hạn chế đồ ngọt và thức ăn nhanh  
    • Duy trì đều đặn các thói quen lành mạnh
    `;
}
else{
    level = "Tuân thủ cao";
    color = "#2ecc71";
    advice = `
    Bạn có chế độ ăn gần với mô hình Địa Trung Hải. 
    Hãy tiếp tục duy trì:
    • Dầu thực vật lành mạnh  
    • Rau, cá, đậu thường xuyên  
    • Lối sống ăn uống ổn định lâu dài
    `;
}

let levelBox = document.getElementById("level");
levelBox.innerText = level;
levelBox.style.background = color;
levelBox.style.color = "white";

document.getElementById("advice").innerHTML = advice;
</script>

</body>
</html>
