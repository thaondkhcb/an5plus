<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết quả MEPA - ĂN5+</title>

<style>
body {
    font-family: Arial;
    background: #f4f8fb;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 18px;
}

.needle {
    position: absolute;
    width: 4px;
    height: 110px;
    background: black;
    left: 50%;
    bottom: 20px;
    transform-origin: bottom;
    transition: 0.8s;
}

.score {
    font-size: 28px;
    font-weight: bold;
}

.level {
    margin-top: 10px;
    padding: 10px;
    color: white;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kết quả MEPA</h2>

<div style="position:relative; width:260px; height:140px; margin:auto;">
<svg id="gauge" width="260" height="140"></svg>
<div id="needle" class="needle"></div>
</div>

<div id="score" class="score"></div>
<div id="level" class="level"></div>

</div>

<script>

// ===== CẤU HÌNH =====
const cx = 130;
const cy = 120;
const r = 110;

// ===== HÀM TÍNH TOẠ ĐỘ =====
function getPoint(value){
    let angle = Math.PI * (value / 16);
    return {
        x: cx - r * Math.cos(angle),
        y: cy - r * Math.sin(angle)
    };
}

// ===== VẼ SVG =====
const svg = document.getElementById("gauge");

// ===== VẼ CUNG =====
function drawArc(startVal, endVal, color){
    let start = getPoint(startVal);
    let end = getPoint(endVal);

    let path = document.createElementNS("http://www.w3.org/2000/svg","path");

    path.setAttribute(
        "d",
        `M ${start.x} ${start.y} A ${r} ${r} 0 0 1 ${end.x} ${end.y}`
    );

    path.setAttribute("stroke", color);
    path.setAttribute("stroke-width", "20");
    path.setAttribute("fill", "none");

    svg.appendChild(path);
}

// 🔴 0–5
drawArc(0,5,"#e74c3c");

// 🟡 6–10
drawArc(5,10,"#f1c40f");

// 🟢 11–16
drawArc(10,16,"#2ecc71");

// ===== VẠCH =====
for(let i=0;i<=16;i++){

    let outer = getPoint(i);

    let innerR = (i===0||i===5||i===10||i===16)?85:95;

    let innerAngle = Math.PI*(i/16);

    let inner = {
        x: cx - innerR * Math.cos(innerAngle),
        y: cy - innerR * Math.sin(innerAngle)
    };

    let line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1", outer.x);
    line.setAttribute("y1", outer.y);
    line.setAttribute("x2", inner.x);
    line.setAttribute("y2", inner.y);

    line.setAttribute("stroke", "#000");
    line.setAttribute("stroke-width", (i%5===0)?3:1);

    svg.appendChild(line);
}

// ===== LẤY ĐIỂM =====
let params = new URLSearchParams(window.location.search);
let diem = parseInt(params.get("score"));

if(isNaN(diem)){
    diem = parseInt(localStorage.getItem("diemMEPA"));
}
if(isNaN(diem)){
    diem = 8;
}

// ===== HIỂN THỊ =====
document.getElementById("score").innerText = diem + "/16";

// ===== XOAY KIM =====
let angleDeg = -90 + (diem / 16) * 180;

document.getElementById("needle").style.transform =
    `translateX(-50%) rotate(${angleDeg}deg)`;

// ===== PHÂN LOẠI =====
let levelBox = document.getElementById("level");

if(diem <= 5){
    levelBox.innerText = "Tuân thủ thấp";
    levelBox.style.background = "#e74c3c";
}
else if(diem <= 10){
    levelBox.innerText = "Tuân thủ trung bình";
    levelBox.style.background = "#f1c40f";
}
else{
    levelBox.innerText = "Tuân thủ cao";
    levelBox.style.background = "#2ecc71";
}

</script>

</body>
</html>
