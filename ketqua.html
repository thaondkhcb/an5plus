<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kết quả MEPA - ĂN5+</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f8fb;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    color: #2c3e50;
}

.score {
    font-size: 30px;
    font-weight: bold;
    margin-top: 10px;
}

/* ===== GAUGE ===== */
.gauge {
    width: 260px;
    height: 130px;
    margin: 30px auto;
    position: relative;
    background: conic-gradient(
        #e74c3c 0deg 60deg,
        #f1c40f 60deg 120deg,
        #2ecc71 120deg 180deg
    );
    border-radius: 260px 260px 0 0;
}

.gauge::after {
    content: "";
    position: absolute;
    width: 200px;
    height: 100px;
    background: white;
    border-radius: 200px 200px 0 0;
    top: 30px;
    left: 30px;
}

/* ===== LABELS ===== */
.labels {
    display: flex;
    justify-content: space-between;
    margin: 0 30px;
    font-size: 12px;
    font-weight: bold;
}

.labels span:nth-child(1){ color: #e74c3c; }
.labels span:nth-child(2){ color: #f1c40f; }
.labels span:nth-child(3){ color: #2ecc71; }

/* ===== NEEDLE ===== */
.needle {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 4px;
    height: 110px;
    background: #2c3e50;
    transform-origin: bottom;
    transition: all 0.8s ease;
    border-radius: 2px;
}

/* ===== RESULT BOX ===== */
.level {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    color: white;
}

.advice {
    text-align: left;
    margin-top: 20px;
    font-size: 14px;
    line-height: 1.6;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">

<h2>Kết quả đánh giá MEPA</h2>

<div class="gauge">
    <div id="needle" class="needle"></div>
</div>

<div class="labels">
    <span>Thấp</span>
    <span>Trung bình</span>
    <span>Cao</span>
</div>

<div id="score" class="score"></div>
<div id="level" class="level"></div>

<div class="advice" id="advice"></div>

<div class="footer">
Kết quả phản ánh mức độ tuân thủ chế độ ăn kiểu Địa Trung Hải (MEPA).  
Không thay thế chẩn đoán hoặc tư vấn y khoa.
</div>

</div>

<script>
// ===== LẤY ĐIỂM =====
let diem = parseInt(localStorage.getItem("diemMEPA") || 0);

// ===== HIỂN THỊ ĐIỂM =====
document.getElementById("score").innerText = diem + " / 16 điểm";

// ===== XOAY KIM (0–16 → 0–180 độ) =====
let goc = (diem / 16) * 180;

// delay nhẹ cho animation đẹp
setTimeout(() => {
    document.getElementById("needle").style.transform = "rotate(" + goc + "deg)";
}, 200);

// ===== PHÂN LOẠI =====
let level = "";
let color = "";
let advice = "";

if(diem <= 5){
    level = "Tuân thủ thấp";
    color = "#e74c3c";
    advice = `
    Bạn chưa đạt mức tuân thủ chế độ ăn lành mạnh.<br><br>
    • Tăng rau xanh và trái cây mỗi ngày<br>
    • Ăn cá, đậu và các loại hạt<br>
    • Ưu tiên ngũ cốc nguyên hạt<br>
    • Hạn chế thịt đỏ và thực phẩm chế biến
    `;
}
else if(diem <= 10){
    level = "Tuân thủ trung bình";
    color = "#f1c40f";
    advice = `
    Bạn đã có một số thói quen ăn uống tốt.<br><br>
    • Tăng tần suất ăn cá và rau<br>
    • Giảm đồ ngọt và thức ăn nhanh<br>
    • Duy trì thói quen lành mạnh mỗi ngày
    `;
}
else{
    level = "Tuân thủ cao";
    color = "#2ecc71";
    advice = `
    Bạn có chế độ ăn gần với mô hình Địa Trung Hải.<br><br>
    • Duy trì dầu thực vật lành mạnh<br>
    • Ăn rau, cá, đậu thường xuyên<br>
    • Giữ thói quen ổn định lâu dài
    `;
}

// ===== ÁP DỤNG UI =====
let levelBox = document.getElementById("level");
levelBox.innerText = level;
levelBox.style.background = color;

// đổi màu kim
document.getElementById("needle").style.background = color;

// nội dung
document.getElementById("advice").innerHTML = advice;

</script>

</body>
</html>
